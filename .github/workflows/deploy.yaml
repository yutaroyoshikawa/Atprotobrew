name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.32.1
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy preview
        id: deploy-preview
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "Preview for PR #${{ github.event.number }} (${{ github.head_ref }})"
          packageManager: pnpm

      - name: Create preview comment file
        if: github.event_name == 'pull_request'
        env:
          PREVIEW_URL: ${{ steps.deploy-preview.outputs.deployment-url }}
          PREVIEW_BRANCH: ${{ github.head_ref }}
        run: |
          cat << EOF > comment-preview.md
          ## Preview deployed
          <table>
            <tr>
              <th scope="row">Branch</th>
              <td>${PREVIEW_BRANCH}</td>
            </tr>
            <tr>
              <th scope="row">Preview URL</th>
              <td><a href="${PREVIEW_URL}" target="_blank" rel="noopener noreferrer">${PREVIEW_URL}</a></td>
            </tr>
          </table>
          EOF

      - name: Create PR comment (preview)
        if: ${{ steps.deploy-preview.outcome == 'success' }}
        run: gh pr comment ${{ github.event.number }} --body-file comment-preview.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deploy-production
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --minify
          packageManager: pnpm

      - name: Resolve PR number
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: pr-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_number=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            -H "Accept: application/vnd.github+json" \
            -q 'map(select(.merged_at != null))[0].number // .[0].number // empty')
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Create production comment file
        if: ${{ steps.deploy-production.outcome == 'success' && steps.pr-number.outputs.number != '' }}
        env:
          PRODUCTION_URL: ${{ steps.deploy-production.outputs.deployment-url }}
          PR_NUMBER: ${{ steps.pr-number.outputs.number }}
        run: |
          cat << EOF > comment-production.md
          ## Production deployed
          <table>
            <tr>
              <th scope="row">PR</th>
              <td>#${PR_NUMBER}</td>
            </tr>
            <tr>
              <th scope="row">Production URL</th>
              <td><a href="${PRODUCTION_URL}" target="_blank" rel="noopener noreferrer">${PRODUCTION_URL}</a></td>
            </tr>
          </table>
          EOF

      - name: Create PR comment (production)
        if: ${{ steps.deploy-production.outcome == 'success' && steps.pr-number.outputs.number != '' }}
        run: gh pr comment ${{ steps.pr-number.outputs.number }} --body-file comment-production.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
