name: Distribute to Firebase

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: "^18.13"
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Pull EAS environment variables
        working-directory: packages/atprotobrew-app
        run: eas env:pull --environment preview

      - name: Build Android APK locally
        working-directory: packages/atprotobrew-app
        run: |
          set -a
          source .env.local
          set +a
          eas build --profile preview --platform android --local --non-interactive --output ./app.apk

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFile: ${{ steps.auth.outputs.credentials_file_path }}
          groups: testers
          file: packages/atprotobrew-app/app.apk
          releaseNotes: ${{ github.event.head_commit.message }}

  ios:
    if: false
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
            packages/atprotobrew-app/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: "^18.13"
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Pull EAS environment variables
        working-directory: packages/atprotobrew-app
        run: eas env:pull --environment preview

      - name: Build iOS IPA locally
        working-directory: packages/atprotobrew-app
        run: |
          set -a
          source .env.local
          set +a
          eas build --profile preview --platform ios --local --non-interactive --output ./app.ipa

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFile: ${{ steps.auth.outputs.credentials_file_path }}
          groups: testers
          file: packages/atprotobrew-app/app.ipa
          releaseNotes: ${{ github.event.head_commit.message }}
